# cxpod.conf — minimal tmux config applied to cxpod sessions.
# Sourced by `cxstart` via `tmux -f <path-to-this-file>` OR `source-file`
# after session creation. Kept intentionally small so it does not conflict
# with the user's personal ~/.tmux.conf (cxpod sessions are ephemeral).

# Use Ctrl-a as prefix to avoid Ctrl-b collisions with Codex's default TUI
# keybindings (which sometimes use Ctrl-b for history).
unbind-key C-b
set -g prefix C-a
bind-key C-a send-prefix

# Colors: assume 256-color terminal; Ghostty and iTerm2 both support this.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Hide the native tmux status bar — cxpod uses a dedicated bottom pane
# driven by cx-status instead. The pane is 1 line tall.
set -g status off

# Mouse on so users can click between panes and scroll.
set -g mouse on

# Larger scrollback for the codex pane.
set -g history-limit 10000

# Keep pane focus on the top (codex) pane after creation.
set -g focus-events on

# No automatic rename — the session name is the cxpod window id.
set -g allow-rename off
set -g automatic-rename off

# Re-source config (handy while iterating).
bind r source-file '#{@cxpod_conf}' \; display-message "cxpod.conf reloaded"
